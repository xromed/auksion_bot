name: Обновить лоты e-auksion.uz

on:
  schedule:
    # 04:00 UTC = 09:00 Ташкент (UTC+5)
    - cron: '0 4 * * *'
  workflow_dispatch:   # ручной запуск через кнопку в GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # нужно для git push

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установка зависимостей
        run: pip install -r requirements.txt

      - name: Записать Google credentials
        if: ${{ secrets.GOOGLE_CREDS_JSON != '' }}
        run: echo '${{ secrets.GOOGLE_CREDS_JSON }}' > google_creds.json

      - name: Запустить бота (один раз, без планировщика)
        env:
          GOOGLE_CREDS_FILE: google_creds.json
        run: python bot.py --no-schedule

      - name: Сгенерировать HTML страницу
        run: python generate_html.py

      - name: Закоммитить и запушить данные
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          git diff --staged --quiet || \
            git commit -m "chore: обновить лоты $(date +'%Y-%m-%d %H:%M UTC')"
          git push
